name: Deploy docs

on:
  push:
    branches: [main]

# Required for GitHub Pages deployments via Actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment runs at a time; if a new push arrives, cancel the
# in-flight run and start fresh so the deployed site is always up to date.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & deploy to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build packages first — docs/src imports from the klods workspace.
      - name: Build klods-css
        run: npm run build --workspace packages/klods-css

      - name: Build klods
        run: npm run build --workspace packages/klods

      - name: Build docs
        run: npm run build --workspace apps/docs

      - uses: actions/configure-pages@v4

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

      - id: deploy
        uses: actions/deploy-pages@v4
